services:
  postgres:
    image: postgres:17-alpine
    container_name: blog-api-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blog_api}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-blog_api}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blog-api-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-blog_api};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-password}
    ports:
      - "${API_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  postgres-data:
