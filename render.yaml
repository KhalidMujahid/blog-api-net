services:
  - type: web
    name: blog-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: blog-api-db
          property: connectionString

databases:
  - name: blog-api-db
    plan: free
    region: oregon
    postgresMajorVersion: "17"
    databaseName: blog_api
